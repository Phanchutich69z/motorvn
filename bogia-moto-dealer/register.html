<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Đăng Ký - Bố Già Moto Dealer</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="form-box">

<h2>Đăng Ký Tài Khoản</h2>

<input type="text" id="fullname" placeholder="Họ và tên">

<input type="email" id="email" placeholder="Email">

<input type="text" id="username" placeholder="Tên đăng nhập">

<input type="password" id="password" placeholder="Mật khẩu">

<button onclick="register()">
Đăng Ký
</button>

<p id="registerMessage"></p>

<a href="index.html" class="buy-btn">
Quay Về Trang Chủ
</a>

</div>

<script>

function register(){

let fullname = document.getElementById("fullname").value.trim();

let email = document.getElementById("email").value.trim();

let username = document.getElementById("username").value.trim();

let password = document.getElementById("password").value.trim();

let message = document.getElementById("registerMessage");

if(
fullname === "" ||
email === "" ||
username === "" ||
password === ""
){

message.innerHTML = "Vui lòng nhập đầy đủ thông tin!";
message.style.color = "yellow";

return;

}

message.innerHTML = "Đăng ký thành công 🔥";
message.style.color = "lightgreen";

setTimeout(() => {

window.location.href = "customer.html";

},1000);

}

</script>

</body>

</html>
